name: Backtest - DCInside Fear&Greed vs Next-day KOSPI

on:
  workflow_dispatch:
    inputs:
      only_date:
        description: "Optional: run only one date (YYYY-MM-DD). Leave empty to run all dates in EVENT_CSV"
        required: false
        default: ""
      max_dates:
        description: "Optional: limit number of dates (0 = no limit)"
        required: true
        default: "0"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Hugging Face / Torch
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          TZ: Asia/Seoul
          USE_FINBERT: "1"
          DC_GALLERY_ID: "krstock"
          DC_LIST_URL: "https://gall.dcinside.com/mgallery/board/lists/"
          EVENT_CSV: "kospi_3pct_days.csv"

          ONLY_DATE: ${{ inputs.only_date }}
          MAX_DATES: ${{ inputs.max_dates }}

          DELAY_SEC: "0.8"
          DEBUG: "0"
        run: |
          python backtest_dcinside_kospi_corr.py

      - name: Commit & Push results if changed
        run: |
          git status --porcelain
          if git status --porcelain | grep -E -q "(backtest_fear_greed.csv|backtest_merged.csv|backtest_corr.csv)"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add backtest_fear_greed.csv backtest_merged.csv backtest_corr.csv
            git commit -m "Backtest: DCInside FG vs next-day KOSPI (auto)"
            git push
          else
            echo "No changes to commit."
          fi
