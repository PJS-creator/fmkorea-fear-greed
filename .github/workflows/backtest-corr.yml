name: Backtest - DCInside Fear&Greed vs Next-day KOSPI

on:
  workflow_dispatch:
    inputs:
      only_date:
        description: "Optional: run only one date (YYYY-MM-DD). Leave empty to run all dates in EVENT_CSV"
        required: false
        default: ""
      max_dates:
        description: "Optional: limit number of dates (0 = no limit)"
        required: true
        default: "0"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Hugging Face / Torch
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          TZ: Asia/Seoul
          USE_FINBERT: "1"
          DC_GALLERY_ID: "krstock"
          DC_LIST_URL: "https://gall.dcinside.com/mgallery/board/lists/"
          EVENT_CSV: "kospi_3pct_days.csv"

          ONLY_DATE: ${{ inputs.only_date }}
          MAX_DATES: ${{ inputs.max_dates }}

          DELAY_SEC: "0.8"
          DEBUG: "0"
        run: |
          python backtest_dcinside_kospi_corr.py

      - name: Commit & Push results if changed
        if: always()
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 결과 파일 추가(없어도 에러 안 나게)
          git add backtest_fear_greed.csv backtest_merged.csv backtest_corr.csv || true

          # 스테이징된 변경이 없으면 종료
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Backtest outputs (auto)"

          # ✅ 원격(main) 최신 커밋을 먼저 받아서(rebase) push 재시도
          for i in 1 2 3 4 5; do
            echo "Attempt $i: pulling latest main with rebase..."
            git pull --rebase origin main || true

            echo "Attempt $i: pushing..."
            if git push; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (non-fast-forward). retrying..."
            sleep $((5*i))
          done

          echo "Push failed after retries."
          exit 1
