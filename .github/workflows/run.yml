name: DCInside Fear & Greed Index (Daily)

on:
  schedule:
    - cron: "40 6 * * *"   # 15:40 KST == 06:40 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # (선택) 모델/토치 캐시하면 매일 다운로드 안 해서 훨씬 안정적
      - name: Cache Hugging Face / Torch
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          TZ: Asia/Seoul
          USE_FINBERT: "1"
          DC_GALLERY_ID: "krstock"
          DC_LIST_URL: "https://gall.dcinside.com/mgallery/board/lists/"
          MAX_PAGES: "10"
          DELAY_SEC: "1.0"
          # DEBUG: "1"   # 문제 생기면 켜세요
        run: |
          python main.py

      - name: Commit & Push index_result.csv if changed
        run: |
          if git status --porcelain | grep -q "index_result.csv"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add index_result.csv
            git commit -m "Update Fear&Greed index (auto)"
            git push
          else
            echo "No changes to commit."
          fi
