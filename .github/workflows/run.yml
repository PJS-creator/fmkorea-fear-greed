name: FMKorea Fear & Greed Index (Daily)

on:
  schedule:
    - cron: "40 6 * * *"   # 15:40 KST == 06:40 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          TZ: Asia/Seoul
          USE_FINBERT: "1"
          MAX_PAGES: "3"     # 20 → 3 (우선 줄여서 429 위험 낮추기)
          DELAY_SEC: "2.0"   # 1.0 → 2.0
          DEBUG: "1"         # ✅ 추가
        run: |
          python main.py

      - name: Commit & Push index_result.csv if changed
        run: |
          if git status --porcelain | grep -q "index_result.csv"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add index_result.csv
            git commit -m "Update Fear&Greed index (auto)"
            git push
          else
            echo "No changes to commit."
          fi
